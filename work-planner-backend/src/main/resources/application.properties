# Server — Render injects PORT automatically
server.port=${PORT:8080}

# App
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# DataSource — Render MySQL injects these
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/work_planner}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=WorkPlannerSuperSecretKeyMustBe32CharsLong!!00
jwt.expiration-ms=86400000

# Mail — Mailersend SMTP
spring.mail.host=smtp.mailersend.net
spring.mail.port=587
spring.mail.username=${MAILERSEND_USERNAME}
spring.mail.password=${MAILERSEND_API_TOKEN}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
mail.from=${MAIL_FROM:MS_workplanner@trial-3vz9dle17z4l7oqr.mlsender.net}

# Async thread pool
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=500
