services:
  - type: web
    name: work-planner-backend
    runtime: java
    rootDir: work-planner-backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/work-planner-backend-1.0.0.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
